name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install WiX Toolset via dotnet tool
        run: dotnet tool install --global wix

      - name: Restore dependencies
        run: dotnet restore src/GetDevice/GetDevice.csproj

      - name: Build app
        run: dotnet build src/GetDevice/GetDevice.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/GetDevice.Tests/GetDevice.Tests.csproj -c Release --no-restore

      - name: Build MSI installer
        run: dotnet build installer/GetDevice.wixproj -c Release --no-restore

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: GetDevice-MSI
          path: |
            installer/bin/Release/**/*.msi
            installer/**/bin/Release/**/GetDevice.msi
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/bin/Release/**/*.msi
            installer/**/bin/Release/**/GetDevice.msi
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
