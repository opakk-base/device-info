name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install WiX Toolset via dotnet tool
        run: dotnet tool install --global wix

      - name: Restore app dependencies
        run: dotnet restore src/GetDevice/GetDevice.csproj

      - name: Restore test dependencies
        run: dotnet restore tests/GetDevice.Tests/GetDevice.Tests.csproj

      - name: Build app
        run: dotnet build src/GetDevice/GetDevice.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/GetDevice.Tests/GetDevice.Tests.csproj -c Release --no-restore

      - name: Build MSI installer
        run: dotnet build installer/GetDevice.wixproj -c Release --no-restore

      - name: Package release artifacts
        shell: pwsh
        run: |
          $msi = Join-Path $env:GITHUB_WORKSPACE 'installer\bin\Release\GetDevice.msi'
          if (-not (Test-Path -LiteralPath $msi)) {
            Write-Error "MSI not found at $msi"
            exit 1
          }
          $out = Join-Path $env:GITHUB_WORKSPACE 'out'
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          Copy-Item -LiteralPath $msi -Destination (Join-Path $out 'GetDevice.msi')
          $hash = (Get-FileHash -LiteralPath $msi -Algorithm SHA256).Hash.ToUpperInvariant()
          Set-Content -LiteralPath (Join-Path $out 'GetDevice.msi.sha256') -Value "$hash  GetDevice.msi"
          Write-Host "Packaged MSI: $msi"
          Write-Host "SHA256: $hash"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GetDevice-Release
          path: out/**
          retention-days: 90

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"

          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --generate-notes \
            out/*
          
          echo "Created release for $tag"
